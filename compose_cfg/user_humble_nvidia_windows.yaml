services:
  my-postgres:
    image: jderobot/bt-studio-database:latest
    container_name: world_db
    environment:
      POSTGRES_DB: world_db
      POSTGRES_USER: user-dev
      POSTGRES_PASSWORD: bt-studio-dev
    ports:
      - "5432:5432"
    volumes:
      - ./RoboticsInfrastructure/database/worlds.sql:/docker-entrypoint-initdb.d/1.sql
      - ./backend/django_auth.sql:/docker-entrypoint-initdb.d/2.sql
      - ./backend/database/db.sql:/docker-entrypoint-initdb.d/3.sql
    healthcheck:
      test: pg_isready -U user-dev -d world_db
      interval: 3s
      timeout: 1s
      retries: 20
      
  bt-studio:
    image: jderobot/bt-studio:latest
    container_name: developer-container
    command: "-bt"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
    runtime: nvidia
    devices:
      - /dev/dri
    environment:
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
    ports:
      - "7164:7164"
      - "7163:7163"
      - "6080-6090:6080-6090"
    volumes:
      - /usr/lib/wsl:/usr/lib/wsl
    tty: true
    stdin_open: true
    depends_on: 
      my-postgres:
        condition: service_healthy
